amcl:
  ros__parameters:
    # Motion-model uncertainty is intentionally higher than the old
    # ground-truth setup so AMCL continues correcting noisy odometry.
    alpha1: 0.12
    alpha2: 0.10
    alpha3: 0.08
    alpha4: 0.10
    alpha5: 0.05
    base_frame_id: base_footprint
    global_frame_id: map
    odom_frame_id: odom
    scan_topic: scan
    robot_model_type: nav2_amcl::DifferentialMotionModel
    laser_model_type: likelihood_field
    laser_min_range: 0.12
    laser_max_range: 8.0
    laser_likelihood_max_dist: 2.0
    max_beams: 180
    min_particles: 500
    max_particles: 2500
    pf_err: 0.03
    pf_z: 0.99
    do_beamskip: true
    beam_skip_distance: 0.45
    beam_skip_threshold: 0.30
    beam_skip_error_threshold: 0.90
    update_min_d: 0.03
    update_min_a: 0.04
    resample_interval: 1
    transform_tolerance: 0.5
    tf_broadcast: true
    save_pose_rate: 0.5
    set_initial_pose: true
    always_reset_initial_pose: false
    initial_pose:
      x: 0.0
      y: 0.0
      z: 0.0
      yaw: 0.0
    recovery_alpha_fast: 0.10
    recovery_alpha_slow: 0.001
    sigma_hit: 0.18
    lambda_short: 0.1
    z_hit: 0.70
    z_short: 0.025
    z_max: 0.025
    z_rand: 0.25

map_server:
  ros__parameters:
    yaml_filename: ""
    topic_name: map
    frame_id: map

bt_navigator:
  ros__parameters:
    global_frame: map
    robot_base_frame: base_footprint
    odom_topic: /odom
    bt_loop_duration: 10
    default_server_timeout: 2000
    wait_for_service_timeout: 2000
    action_server_result_timeout: 900.0
    navigators: [navigate_to_pose, navigate_through_poses]
    navigate_to_pose:
      plugin: nav2_bt_navigator::NavigateToPoseNavigator
    navigate_through_poses:
      plugin: nav2_bt_navigator::NavigateThroughPosesNavigator
    error_code_names:
      - compute_path_error_code
      - follow_path_error_code

controller_server:
  ros__parameters:
    # Fifteen control updates per second is responsive while remaining stable
    # under WSL's variable scheduling latency.
    controller_frequency: 15.0
    costmap_update_timeout: 0.5
    min_x_velocity_threshold: 0.001
    min_y_velocity_threshold: 0.5
    min_theta_velocity_threshold: 0.001
    failure_tolerance: 0.3
    use_realtime_priority: false
    progress_checker_plugins: [progress_checker]
    goal_checker_plugins: [goal_checker]
    controller_plugins: [FollowPath]

    progress_checker:
      plugin: nav2_controller::SimpleProgressChecker
      required_movement_radius: 0.04
      movement_time_allowance: 12.0

    goal_checker:
      plugin: nav2_controller::SimpleGoalChecker
      xy_goal_tolerance: 0.08
      yaw_goal_tolerance: 0.12
      stateful: true

    FollowPath:
      plugin: dwb_core::DWBLocalPlanner
      debug_trajectory_details: true
      # A small negative limit lets DWB choose a safe reverse trajectory when
      # the target is behind the robot instead of always turning around first.
      min_vel_x: -0.10
      min_vel_y: 0.0
      max_vel_x: 0.20
      max_vel_y: 0.0
      max_vel_theta: 0.65
      min_speed_xy: 0.0
      max_speed_xy: 0.20
      min_speed_theta: 0.0
      acc_lim_x: 0.40
      acc_lim_y: 0.0
      acc_lim_theta: 1.20
      decel_lim_x: -0.40
      decel_lim_y: 0.0
      decel_lim_theta: -1.20
      vx_samples: 22
      vy_samples: 1
      vtheta_samples: 32
      sim_time: 1.7
      linear_granularity: 0.05
      angular_granularity: 0.025
      transform_tolerance: 0.2
      xy_goal_tolerance: 0.08
      trans_stopped_velocity: 0.03
      short_circuit_trajectory_evaluation: true
      stateful: true
      critics:
        - RotateToGoal
        - Oscillation
        - BaseObstacle
        - GoalAlign
        - PathAlign
        - PathDist
        - GoalDist
      # Give collision-free trajectories more weight while retaining enough
      # path freedom to steer around a temporary LiDAR obstacle.
      BaseObstacle.scale: 0.08
      PathAlign.scale: 18.0
      GoalAlign.scale: 14.0
      PathDist.scale: 26.0
      GoalDist.scale: 18.0
      RotateToGoal.scale: 30.0
      RotateToGoal.slowing_factor: 5.0
      RotateToGoal.lookahead_time: -1.0

local_costmap:
  local_costmap:
    ros__parameters:
      update_frequency: 10.0
      publish_frequency: 10.0
      global_frame: odom
      robot_base_frame: base_footprint
      rolling_window: true
      width: 3
      height: 3
      resolution: 0.05
      transform_tolerance: 0.3
      footprint: "[[0.21, 0.18], [0.21, -0.18], [-0.21, -0.18], [-0.21, 0.18]]"
      footprint_padding: 0.015
      plugins: [obstacle_layer, inflation_layer]
      obstacle_layer:
        plugin: nav2_costmap_2d::ObstacleLayer
        enabled: true
        footprint_clearing_enabled: true
        observation_sources: scan
        scan:
          topic: /scan
          data_type: LaserScan
          clearing: true
          marking: true
          # Retain moving returns briefly so the planner does not oscillate
          # when an obstacle falls between adjacent LiDAR beams.
          observation_persistence: 0.35
          expected_update_rate: 0.20
          max_obstacle_height: 2.0
          raytrace_min_range: 0.12
          raytrace_max_range: 8.0
          obstacle_min_range: 0.12
          obstacle_max_range: 7.5
      inflation_layer:
        plugin: nav2_costmap_2d::InflationLayer
        inflation_radius: 0.40
        cost_scaling_factor: 6.0
      always_send_full_costmap: true

global_costmap:
  global_costmap:
    ros__parameters:
      update_frequency: 5.0
      publish_frequency: 2.0
      global_frame: map
      robot_base_frame: base_footprint
      resolution: 0.05
      track_unknown_space: true
      footprint: "[[0.21, 0.18], [0.21, -0.18], [-0.21, -0.18], [-0.21, 0.18]]"
      footprint_padding: 0.015
      plugins: [static_layer, obstacle_layer, inflation_layer]
      static_layer:
        plugin: nav2_costmap_2d::StaticLayer
        map_subscribe_transient_local: true
      obstacle_layer:
        plugin: nav2_costmap_2d::ObstacleLayer
        enabled: true
        footprint_clearing_enabled: true
        observation_sources: scan
        scan:
          topic: /scan
          data_type: LaserScan
          clearing: true
          marking: true
          observation_persistence: 0.50
          expected_update_rate: 0.20
          max_obstacle_height: 2.0
          raytrace_min_range: 0.12
          raytrace_max_range: 8.0
          obstacle_min_range: 0.12
          obstacle_max_range: 7.5
      inflation_layer:
        plugin: nav2_costmap_2d::InflationLayer
        inflation_radius: 0.35
        cost_scaling_factor: 5.5
      always_send_full_costmap: true

velocity_smoother:
  ros__parameters:
    smoothing_frequency: 25.0
    scale_velocities: false
    feedback: OPEN_LOOP
    max_velocity: [0.20, 0.0, 0.65]
    min_velocity: [-0.10, 0.0, -0.65]
    max_accel: [0.40, 0.0, 1.20]
    max_decel: [-0.40, 0.0, -1.20]
    odom_topic: /odom
    odom_duration: 0.10
    deadband_velocity: [0.0, 0.0, 0.0]
    velocity_timeout: 0.50
    enable_stamped_cmd_vel: false

collision_monitor:
  ros__parameters:
    base_frame_id: base_footprint
    odom_frame_id: odom
    cmd_vel_in_topic: /cmd_vel_nav
    cmd_vel_out_topic: /cmd_vel
    state_topic: /collision_monitor_state
    transform_tolerance: 0.2
    source_timeout: 0.5
    base_shift_correction: true
    # Stop publishing quickly after Nav2 releases velocity control so the
    # precision docking controller can use /cmd_vel without contention.
    stop_pub_timeout: 0.2
    polygons:
      - EmergencyFront
      - EmergencyRear
      - EmergencyLeft
      - EmergencyRight
      - SlowdownFront
      - SlowdownRear
      - SlowdownLeft
      - SlowdownRight
    # Four sectors form a 360-degree safety ring while leaving the robot's
    # own footprint outside every polygon to avoid self-detection.
    EmergencyFront:
      type: polygon
      points: "[[0.52, 0.34], [0.52, -0.34], [0.24, -0.34], [0.24, 0.34]]"
      action_type: stop
      min_points: 4
      visualize: true
      polygon_pub_topic: /collision_monitor/emergency_front
      enabled: true
    EmergencyRear:
      type: polygon
      points: "[[-0.24, 0.34], [-0.24, -0.34], [-0.48, -0.34], [-0.48, 0.34]]"
      action_type: stop
      min_points: 4
      visualize: true
      polygon_pub_topic: /collision_monitor/emergency_rear
      enabled: true
    EmergencyLeft:
      type: polygon
      points: "[[-0.48, 0.40], [-0.48, 0.22], [0.52, 0.22], [0.52, 0.40]]"
      action_type: stop
      min_points: 4
      visualize: true
      polygon_pub_topic: /collision_monitor/emergency_left
      enabled: true
    EmergencyRight:
      type: polygon
      points: "[[-0.48, -0.22], [-0.48, -0.40], [0.52, -0.40], [0.52, -0.22]]"
      action_type: stop
      min_points: 4
      visualize: true
      polygon_pub_topic: /collision_monitor/emergency_right
      enabled: true
    SlowdownFront:
      type: polygon
      points: "[[0.95, 0.55], [0.95, -0.55], [0.24, -0.55], [0.24, 0.55]]"
      action_type: slowdown
      min_points: 4
      slowdown_ratio: 0.35
      visualize: true
      polygon_pub_topic: /collision_monitor/slowdown_front
      enabled: true
    SlowdownRear:
      type: polygon
      points: "[[-0.24, 0.55], [-0.24, -0.55], [-0.75, -0.55], [-0.75, 0.55]]"
      action_type: slowdown
      min_points: 4
      slowdown_ratio: 0.35
      visualize: true
      polygon_pub_topic: /collision_monitor/slowdown_rear
      enabled: true
    SlowdownLeft:
      type: polygon
      points: "[[-0.75, 0.62], [-0.75, 0.22], [0.95, 0.22], [0.95, 0.62]]"
      action_type: slowdown
      min_points: 4
      slowdown_ratio: 0.35
      visualize: true
      polygon_pub_topic: /collision_monitor/slowdown_left
      enabled: true
    SlowdownRight:
      type: polygon
      points: "[[-0.75, -0.22], [-0.75, -0.62], [0.95, -0.62], [0.95, -0.22]]"
      action_type: slowdown
      min_points: 4
      slowdown_ratio: 0.35
      visualize: true
      polygon_pub_topic: /collision_monitor/slowdown_right
      enabled: true
    observation_sources: [scan]
    scan:
      type: scan
      topic: /scan
      enabled: true

planner_server:
  ros__parameters:
    expected_planner_frequency: 5.0
    costmap_update_timeout: 1.0
    planner_plugins: [GridBased]
    GridBased:
      plugin: nav2_navfn_planner::NavfnPlanner
      # A moving obstacle can briefly occupy the exact waypoint cell. This
      # tolerance lets Navfn end at a nearby free cell; the controller's goal
      # checker still enforces the tighter final-pose tolerance above.
      tolerance: 0.18
      use_astar: true
      allow_unknown: false

behavior_server:
  ros__parameters:
    local_costmap_topic: local_costmap/costmap_raw
    global_costmap_topic: global_costmap/costmap_raw
    local_footprint_topic: local_costmap/published_footprint
    global_footprint_topic: global_costmap/published_footprint
    cycle_frequency: 10.0
    behavior_plugins: [spin, backup, drive_on_heading, wait]
    spin:
      plugin: nav2_behaviors::Spin
    backup:
      plugin: nav2_behaviors::BackUp
    drive_on_heading:
      plugin: nav2_behaviors::DriveOnHeading
    wait:
      plugin: nav2_behaviors::Wait
    local_frame: odom
    global_frame: map
    robot_base_frame: base_footprint
    transform_tolerance: 0.2
    simulate_ahead_time: 2.0
    max_rotational_vel: 0.70
    min_rotational_vel: 0.20
    rotational_acc_lim: 1.50
