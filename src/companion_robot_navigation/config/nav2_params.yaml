amcl:
  ros__parameters:
    alpha1: 0.05
    alpha2: 0.05
    alpha3: 0.05
    alpha4: 0.05
    alpha5: 0.05
    base_frame_id: base_footprint
    global_frame_id: map
    odom_frame_id: odom
    scan_topic: scan
    robot_model_type: nav2_amcl::DifferentialMotionModel
    laser_model_type: likelihood_field
    laser_min_range: 0.12
    laser_max_range: 8.0
    laser_likelihood_max_dist: 2.0
    max_beams: 120
    min_particles: 300
    max_particles: 1500
    pf_err: 0.05
    pf_z: 0.99
    do_beamskip: false
    update_min_d: 0.05
    update_min_a: 0.05
    resample_interval: 1
    transform_tolerance: 0.5
    tf_broadcast: true
    save_pose_rate: 0.5
    set_initial_pose: true
    always_reset_initial_pose: false
    initial_pose:
      x: 0.0
      y: 0.0
      z: 0.0
      yaw: 0.0
    sigma_hit: 0.2
    lambda_short: 0.1
    z_hit: 0.5
    z_short: 0.05
    z_max: 0.05
    z_rand: 0.5

map_server:
  ros__parameters:
    yaml_filename: ""
    topic_name: map
    frame_id: map

bt_navigator:
  ros__parameters:
    global_frame: map
    robot_base_frame: base_footprint
    odom_topic: /odom
    bt_loop_duration: 10
    default_server_timeout: 2000
    wait_for_service_timeout: 2000
    action_server_result_timeout: 900.0
    navigators: [navigate_to_pose, navigate_through_poses]
    navigate_to_pose:
      plugin: nav2_bt_navigator::NavigateToPoseNavigator
    navigate_through_poses:
      plugin: nav2_bt_navigator::NavigateThroughPosesNavigator
    error_code_names:
      - compute_path_error_code
      - follow_path_error_code

controller_server:
  ros__parameters:
    controller_frequency: 15.0
    costmap_update_timeout: 0.5
    min_x_velocity_threshold: 0.001
    min_y_velocity_threshold: 0.5
    min_theta_velocity_threshold: 0.001
    failure_tolerance: 0.5
    use_realtime_priority: false
    progress_checker_plugins: [progress_checker]
    goal_checker_plugins: [goal_checker]
    controller_plugins: [FollowPath]

    progress_checker:
      plugin: nav2_controller::SimpleProgressChecker
      required_movement_radius: 0.05
      movement_time_allowance: 20.0

    goal_checker:
      plugin: nav2_controller::SimpleGoalChecker
      xy_goal_tolerance: 0.10
      yaw_goal_tolerance: 0.15
      stateful: true

    FollowPath:
      plugin: dwb_core::DWBLocalPlanner
      debug_trajectory_details: true
      # A small negative limit lets DWB choose a safe reverse trajectory when
      # the target is behind the robot instead of always turning around first.
      min_vel_x: -0.12
      min_vel_y: 0.0
      max_vel_x: 0.22
      max_vel_y: 0.0
      max_vel_theta: 0.70
      min_speed_xy: 0.0
      max_speed_xy: 0.22
      min_speed_theta: 0.0
      acc_lim_x: 0.50
      acc_lim_y: 0.0
      acc_lim_theta: 1.50
      decel_lim_x: -0.50
      decel_lim_y: 0.0
      decel_lim_theta: -1.50
      vx_samples: 24
      vy_samples: 1
      vtheta_samples: 36
      sim_time: 2.0
      linear_granularity: 0.05
      angular_granularity: 0.025
      transform_tolerance: 0.2
      xy_goal_tolerance: 0.10
      trans_stopped_velocity: 0.03
      short_circuit_trajectory_evaluation: true
      stateful: true
      critics:
        - RotateToGoal
        - Oscillation
        - BaseObstacle
        - GoalAlign
        - PathAlign
        - PathDist
        - GoalDist
      # Give collision-free trajectories more weight while retaining enough
      # path freedom to steer around a temporary LiDAR obstacle.
      BaseObstacle.scale: 0.05
      PathAlign.scale: 20.0
      GoalAlign.scale: 16.0
      PathDist.scale: 28.0
      GoalDist.scale: 20.0
      RotateToGoal.scale: 32.0
      RotateToGoal.slowing_factor: 5.0
      RotateToGoal.lookahead_time: -1.0

local_costmap:
  local_costmap:
    ros__parameters:
      update_frequency: 10.0
      publish_frequency: 10.0
      global_frame: odom
      robot_base_frame: base_footprint
      rolling_window: true
      width: 4
      height: 4
      resolution: 0.05
      transform_tolerance: 0.3
      footprint: "[[0.21, 0.18], [0.21, -0.18], [-0.21, -0.18], [-0.21, 0.18]]"
      footprint_padding: 0.02
      plugins: [obstacle_layer, inflation_layer]
      obstacle_layer:
        plugin: nav2_costmap_2d::ObstacleLayer
        enabled: true
        footprint_clearing_enabled: true
        observation_sources: scan
        scan:
          topic: /scan
          data_type: LaserScan
          clearing: true
          marking: true
          observation_persistence: 0.0
          max_obstacle_height: 2.0
          raytrace_min_range: 0.12
          raytrace_max_range: 8.0
          obstacle_min_range: 0.12
          obstacle_max_range: 7.5
      inflation_layer:
        plugin: nav2_costmap_2d::InflationLayer
        inflation_radius: 0.48
        cost_scaling_factor: 4.0
      always_send_full_costmap: true

global_costmap:
  global_costmap:
    ros__parameters:
      update_frequency: 5.0
      publish_frequency: 2.0
      global_frame: map
      robot_base_frame: base_footprint
      resolution: 0.05
      track_unknown_space: true
      footprint: "[[0.21, 0.18], [0.21, -0.18], [-0.21, -0.18], [-0.21, 0.18]]"
      footprint_padding: 0.02
      plugins: [static_layer, obstacle_layer, inflation_layer]
      static_layer:
        plugin: nav2_costmap_2d::StaticLayer
        map_subscribe_transient_local: true
      obstacle_layer:
        plugin: nav2_costmap_2d::ObstacleLayer
        enabled: true
        footprint_clearing_enabled: true
        observation_sources: scan
        scan:
          topic: /scan
          data_type: LaserScan
          clearing: true
          marking: true
          observation_persistence: 0.0
          max_obstacle_height: 2.0
          raytrace_min_range: 0.12
          raytrace_max_range: 8.0
          obstacle_min_range: 0.12
          obstacle_max_range: 7.5
      inflation_layer:
        plugin: nav2_costmap_2d::InflationLayer
        inflation_radius: 0.38
        cost_scaling_factor: 5.0
      always_send_full_costmap: true

collision_monitor:
  ros__parameters:
    base_frame_id: base_footprint
    odom_frame_id: odom
    cmd_vel_in_topic: /cmd_vel_nav
    cmd_vel_out_topic: /cmd_vel
    state_topic: /collision_monitor_state
    transform_tolerance: 0.2
    source_timeout: 0.5
    base_shift_correction: true
    # Stop publishing quickly after Nav2 releases velocity control so the
    # precision docking controller can use /cmd_vel without contention.
    stop_pub_timeout: 0.2
    polygons:
      - EmergencyFront
      - EmergencyRear
      - EmergencyLeft
      - EmergencyRight
      - SlowdownFront
      - SlowdownRear
      - SlowdownLeft
      - SlowdownRight
    # Four sectors form a 360-degree safety ring while leaving the robot's
    # own footprint outside every polygon to avoid self-detection.
    EmergencyFront:
      type: polygon
      points: "[[0.52, 0.34], [0.52, -0.34], [0.24, -0.34], [0.24, 0.34]]"
      action_type: stop
      min_points: 4
      visualize: true
      polygon_pub_topic: /collision_monitor/emergency_front
      enabled: true
    EmergencyRear:
      type: polygon
      points: "[[-0.24, 0.34], [-0.24, -0.34], [-0.48, -0.34], [-0.48, 0.34]]"
      action_type: stop
      min_points: 4
      visualize: true
      polygon_pub_topic: /collision_monitor/emergency_rear
      enabled: true
    EmergencyLeft:
      type: polygon
      points: "[[-0.48, 0.40], [-0.48, 0.22], [0.52, 0.22], [0.52, 0.40]]"
      action_type: stop
      min_points: 4
      visualize: true
      polygon_pub_topic: /collision_monitor/emergency_left
      enabled: true
    EmergencyRight:
      type: polygon
      points: "[[-0.48, -0.22], [-0.48, -0.40], [0.52, -0.40], [0.52, -0.22]]"
      action_type: stop
      min_points: 4
      visualize: true
      polygon_pub_topic: /collision_monitor/emergency_right
      enabled: true
    SlowdownFront:
      type: polygon
      points: "[[0.95, 0.55], [0.95, -0.55], [0.24, -0.55], [0.24, 0.55]]"
      action_type: slowdown
      min_points: 4
      slowdown_ratio: 0.35
      visualize: true
      polygon_pub_topic: /collision_monitor/slowdown_front
      enabled: true
    SlowdownRear:
      type: polygon
      points: "[[-0.24, 0.55], [-0.24, -0.55], [-0.75, -0.55], [-0.75, 0.55]]"
      action_type: slowdown
      min_points: 4
      slowdown_ratio: 0.35
      visualize: true
      polygon_pub_topic: /collision_monitor/slowdown_rear
      enabled: true
    SlowdownLeft:
      type: polygon
      points: "[[-0.75, 0.62], [-0.75, 0.22], [0.95, 0.22], [0.95, 0.62]]"
      action_type: slowdown
      min_points: 4
      slowdown_ratio: 0.35
      visualize: true
      polygon_pub_topic: /collision_monitor/slowdown_left
      enabled: true
    SlowdownRight:
      type: polygon
      points: "[[-0.75, -0.22], [-0.75, -0.62], [0.95, -0.62], [0.95, -0.22]]"
      action_type: slowdown
      min_points: 4
      slowdown_ratio: 0.35
      visualize: true
      polygon_pub_topic: /collision_monitor/slowdown_right
      enabled: true
    observation_sources: [scan]
    scan:
      type: scan
      topic: /scan
      enabled: true

planner_server:
  ros__parameters:
    expected_planner_frequency: 5.0
    costmap_update_timeout: 1.0
    planner_plugins: [GridBased]
    GridBased:
      plugin: nav2_navfn_planner::NavfnPlanner
      tolerance: 0.15
      use_astar: true
      allow_unknown: false

behavior_server:
  ros__parameters:
    local_costmap_topic: local_costmap/costmap_raw
    global_costmap_topic: global_costmap/costmap_raw
    local_footprint_topic: local_costmap/published_footprint
    global_footprint_topic: global_costmap/published_footprint
    cycle_frequency: 10.0
    behavior_plugins: [spin, backup, drive_on_heading, wait]
    spin:
      plugin: nav2_behaviors::Spin
    backup:
      plugin: nav2_behaviors::BackUp
    drive_on_heading:
      plugin: nav2_behaviors::DriveOnHeading
    wait:
      plugin: nav2_behaviors::Wait
    local_frame: odom
    global_frame: map
    robot_base_frame: base_footprint
    transform_tolerance: 0.2
    simulate_ahead_time: 2.0
    max_rotational_vel: 0.70
    min_rotational_vel: 0.20
    rotational_acc_lim: 1.50
