docking_behavior:
  ros__parameters:
    # All poses use [x, y, yaw] in the map frame; yaw is in radians.
    frame_id: map

    # Nav2 will bring the robot here before precision docking takes over.
    staging_pose: [0.0, -1.70, 1.5708]

    # Final robot-centre pose between the dock's two side guides.
    dock_pose: [0.0, -2.55, 1.5708]

    # The robot faces north at both poses and reverses south into the dock.
    approach_direction: reverse

    robot_frame: base_footprint
    controller_frequency: 20.0
    nav2_server_timeout: 30.0
    # Let an active patrol goal finish canceling before staging takes Nav2.
    nav2_handoff_delay: 1.0

    # Precision-approach limits. Reverse speed is intentionally slow.
    max_reverse_speed: 0.08
    min_reverse_speed: 0.025
    max_forward_speed: 0.10
    min_forward_speed: 0.03
    max_angular_speed: 0.30
    linear_gain: 0.60
    angular_gain: 1.80
    lateral_gain: 3.00
    max_lateral_heading_correction: 0.30
    heading_stop_angle: 0.15
    alignment_yaw_tolerance: 0.04
    alignment_timeout: 10.0
    precision_docking_timeout: 45.0
    progress_timeout: 6.0
    progress_distance_epsilon: 0.01

    dock_position_tolerance: 0.05
    dock_yaw_tolerance: 0.08
    contact_position_tolerance: 0.09
    staging_position_tolerance: 0.08

    # Stop if the rear LiDAR sector sees something before the expected dock.
    rear_sector_half_angle: 0.35
    rear_stop_distance: 0.15
    front_sector_half_angle: 0.35
    front_self_filter_distance: 0.16
    front_stop_distance: 0.28
    sensor_timeout: 1.0

    # The rear camera takes over after Nav2 reaches the staging pose. The map
    # pose remains a cross-check and LiDAR remains the emergency stop sensor.
    visual_docking_enabled: true
    marker_pose_topic: /dock_marker/pose
    marker_visible_topic: /dock_marker/visible
    marker_acquisition_timeout: 6.0
    marker_pose_timeout: 0.60
    marker_loss_timeout: 1.50
    marker_target_distance: 0.15
    marker_distance_tolerance: 0.025
    marker_lateral_tolerance: 0.025
    visual_lateral_gain: 3.00
    visual_global_position_tolerance: 0.16
    marker_recovery_limit: 2
    marker_recovery_timeout: 20.0

    # Undocking is blocked until the simulated battery reaches this level.
    min_undock_battery: 0.50
